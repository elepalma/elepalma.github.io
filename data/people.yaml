members:
  - name: "Dr. Elena Palma"
    photo: "/images/people/elepalma.JPG"
    initials: "EP"
    role: "Principal Investigator and Lecturer (Adj/Hon)"
    role_type: "pi"
    area: "Mitochondrial Medicine · ALD · Liver Cancer · Translational Research"
    bio: "Ele leads the Palma Lab at the Roger Williams Institute of Liver Studies, King's College London. With nearly 15 years of experience in hepatology research, her work focuses on developing novel multi-pronged treatments for alcohol-related liver disease and liver cancers. The lab uses translational experimental models to dissect fibrosis, inflammation, hepatotoxicity, liver regeneration, and mitochondrial dysfunction — bridging basic science and preclinical drug discovery. She holds a PhD in Cellular Biology and a degree in Pharmaceutical Chemistry and Technology from the University of Padova, Italy."
    email: "e.palma@researchinliver.org.uk"
    twitter: "https://x.com/DrElePalma"
    linkedin: "https://www.linkedin.com/in/elena-palma-4400a52a/"
    researchgate: "https://www.researchgate.net/profile/Elena-Palma-2"
    orcid: ""
    gscholar: ""

  - name: "Dr. Meliz Sahuri-Arisoylu"
    photo: "/images/people/meliz.jpg"
    initials: "MA"
    role: "Research Fellow"
    role_type: "postdoc"
    area: "Mitochondrial Dynamics · ALD · MetALD"
    bio: "Meliz joined the Palma Lab in 2024 as a Research Fellow in the Mitochondrial Medicine for Liver Disease Lab. She holds an MSc and PhD from Imperial College London and brings experience from both academia and industry. Her current work investigates changes in mitochondrial dynamics and function in Alcohol-Related Liver Disease (ALD) and Metabolic Dysfunction and Alcohol-Related Steatotic Liver Disease (MetALD), with a particular focus on megamitochondria and their role in disease diagnosis and treatment."
    kcl: "https://www.kcl.ac.uk/people/meliz-sahuri-arisoylu"

  - name: "Una Rastovic"
    photo: "/images/people/una.jpg"
    initials: "UR"
    role: "PhD Student"
    role_type: "phd"
    area: "Mitochondrial Morphology · ALD · Liver Fibrosis"
    bio: "Una joined the Roger Williams Institute of Liver Studies as a Research Assistant in 2020 and started her PhD in the Palma Lab in 2023. She completed her BSc in Molecular Biology at the University of Zagreb and her MSc in Cancer Immunology and Biotechnology at the University of Nottingham. Her PhD investigates changes in mitochondrial morphology and function in ALD and liver fibrosis, with the aim of targeting mitochondria as a therapeutic strategy. She is a recipient of the Research Society on Alcohol Doctoral Students Small Grant."
    kcl: "https://www.kcl.ac.uk/people/una-rastovic"

