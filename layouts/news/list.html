{{ define "main" }}

<div class="page-hero">
  <div class="max-w-wide mx-auto px-4 sm:px-8 lg:px-12 xl:px-20 py-6 sm:py-10">
    <p class="text-2xs font-semibold uppercase tracking-widest text-accent mb-2">Latest</p>
    <h1 class="font-sans text-3xl sm:text-4xl xl:text-5xl tracking-tight text-ink">News</h1>
  </div>
</div>

<div class="max-w-wide mx-auto px-4 sm:px-8 lg:px-12 xl:px-20 py-6 sm:py-10">
  <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5">
    {{ range .Pages.ByDate.Reverse }}
    <a href="{{ .RelPermalink }}" class="card-hover bg-white border border-rule rounded-lg overflow-hidden block">
      <div class="h-28 bg-gradient-to-br from-accent-light to-green-100 flex items-center justify-center text-4xl">{{ .Params.emoji | default "📰" }}</div>
      <div class="p-5">
        {{ with .Params.category }}<span class="inline-block text-2xs font-semibold uppercase tracking-widest text-accent bg-accent-light px-2.5 py-0.5 rounded-full mb-2">{{ . }}</span>{{ end }}
        <p class="text-2xs text-ink-faint mb-1.5">{{ .Date.Format "2 January 2006" }}</p>
        <h3 class="text-sm font-medium leading-snug mb-2">{{ .Title }}</h3>
        <p class="text-xs text-ink-light leading-relaxed">{{ .Params.summary }}</p>
      </div>
    </a>
    {{ end }}
  </div>
</div>

{{ end }}
